<footer class="site-footer">
  <div class="site-footer-inner">
    <div class="footer-links">
      {% if site.github_username %}
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noreferrer">github</a>
      {% endif %}
      {% if site.twitter_username %}
      <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noreferrer">twitter</a>
      {% endif %}
      {% if site.codepen_username %}
      <a href="https://codepen.io/{{ site.codepen_username }}" target="_blank" rel="noreferrer">codepen</a>
      {% endif %}
      <a href="{{ "/feed.xml" | prepend: site.baseurl }}" target="_blank" rel="noreferrer">rss</a>
    </div>
    <p class="footer-copy">&copy; <script>document.write(new Date().getFullYear());</script> {{ site.description }}</p>
  </div>
</footer>

<button class="to-top" type="button" aria-label="返回顶部">↑</button>

<script src="{{ "/js/blog.js" | prepend: site.baseurl }}"></script>

{% include analyze.html %}
