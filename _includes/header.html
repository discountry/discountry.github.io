<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="{{ site.baseurl }}/"><span class="brand-mark"></span>{{ site.title }}</a>
    <nav class="site-nav">
      <!-- <a href="https://zh-hans.react.dev/" target="_blank" rel="noreferrer">React 中文文档</a> -->
      {% assign sorted_pages = site.pages | sort: 'order' %}
      {% for p in sorted_pages %}
        {% if p.title %}
        <a href="{{ p.url | prepend: site.baseurl }}"{% if page.url == p.url %} aria-current="page"{% endif %}>{{ p.title }}</a>
        {% endif %}
      {% endfor %}
      <a href="{{ "/feed.xml" | prepend: site.baseurl }}" target="_blank" rel="noreferrer">RSS</a>
      <a href="{{ "/podcast.xml" | prepend: site.baseurl }}" target="_blank" rel="noreferrer">Podcast</a>
    </nav>
    <div class="nav-search">
      <input type="search" placeholder="搜索文章" aria-label="搜索文章" data-home="{{ site.baseurl }}/">
      <kbd>/</kbd>
    </div>
  </div>
</header>
